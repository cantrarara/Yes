<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin:0; overflow:hidden; background:#87CEEB; touch-action:none; }
    canvas { display:block; }

    .btn {
      position:absolute;
      bottom:20px;
      right:20px;
      background:#fff;
      padding:10px;
      border-radius:10px;
      font-size:14px;
    }

    #craft2 { bottom:70px; }
  </style>
</head>
<body>

<canvas id="game"></canvas>

<div class="btn" onclick="craftPickaxe()">Pickaxe</div>
<div class="btn" id="craft2" onclick="craftSword()">Sword</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// PLAYER
let player = { x:0, y:0, size:15 };

// INVENTORY
let inventory = { wood:10, stone:10, gold:0, sword:0, pickaxe:0 };

// CHUNK
let chunkSize = 200;
let chunks = {};
let maxChunks = 20;

// MOB
let mobs = [];
for(let i=0;i<5;i++){
  mobs.push({
    x: Math.random()*1000,
    y: Math.random()*1000,
    dx:(Math.random()-0.5)*2,
    dy:(Math.random()-0.5)*2
  });
}

// HEROBRINE
let herobrine = { x:0,y:0,visible:false,timer:0 };

// SECRET
let secretFound = false;

// JOYSTICK
let joy = { active:false, startX:0, startY:0, dx:0, dy:0 };

// TOUCH CONTROL
canvas.addEventListener("touchstart", e=>{
  let t = e.touches[0];

  // kiri = joystick
  if(t.clientX < canvas.width/2){
    joy.active = true;
    joy.startX = t.clientX;
    joy.startY = t.clientY;
  } else {
    // kanan = mining
    mine(t.clientX, t.clientY);
  }
});

canvas.addEventListener("touchmove", e=>{
  if(!joy.active) return;

  let t = e.touches[0];
  joy.dx = t.clientX - joy.startX;
  joy.dy = t.clientY - joy.startY;
});

canvas.addEventListener("touchend", ()=>{
  joy.active = false;
  joy.dx = 0;
  joy.dy = 0;
});

// MOVEMENT
function updatePlayer(){
  player.x += joy.dx * 0.05;
  player.y += joy.dy * 0.05;
}

// CHUNK
function chunkKey(cx, cy){ return cx+","+cy; }

function generateChunk(cx, cy){
  let key = chunkKey(cx,cy);
  if(chunks[key]) return;

  let blocks = [];
  for(let i=0;i<20;i++){
    blocks.push({
      x: cx*chunkSize + Math.random()*chunkSize,
      y: cy*chunkSize + Math.random()*chunkSize
    });
  }

  chunks[key]=blocks;

  let keys = Object.keys(chunks);
  if(keys.length > maxChunks) delete chunks[keys[0]];
}

function updateChunks(){
  let cx = Math.floor(player.x/chunkSize);
  let cy = Math.floor(player.y/chunkSize);

  for(let dx=-1;dx<=1;dx++){
    for(let dy=-1;dy<=1;dy++){
      generateChunk(cx+dx, cy+dy);
    }
  }
}

// MINING
function mine(x,y){
  let offsetX = canvas.width/2 - player.x;
  let offsetY = canvas.height/2 - player.y;

  for(let key in chunks){
    chunks[key] = chunks[key].filter(b=>{
      let dx = (b.x + offsetX) - x;
      let dy = (b.y + offsetY) - y;

      if(Math.sqrt(dx*dx+dy*dy)<15){
        let r=Math.random();
        if(r<0.4) inventory.wood++;
        else if(r<0.8) inventory.stone++;
        else inventory.gold++;
        return false;
      }
      return true;
    });
  }
}

// CRAFT
function craftPickaxe(){
  if(inventory.wood>=2 && inventory.stone>=3){
    inventory.wood-=2;
    inventory.stone-=3;
    inventory.pickaxe++;
  }
}

function craftSword(){
  if(inventory.wood>=1 && inventory.stone>=2){
    inventory.wood-=1;
    inventory.stone-=2;
    inventory.sword++;
  }
}

// LOOP
function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  updatePlayer();
  updateChunks();

  let offsetX = canvas.width/2 - player.x;
  let offsetY = canvas.height/2 - player.y;

  // WORLD
  for(let key in chunks){
    chunks[key].forEach(b=>{
      ctx.beginPath();
      ctx.arc(b.x+offsetX, b.y+offsetY, 10, 0, Math.PI*2);
      ctx.fillStyle="brown";
      ctx.fill();
    });
  }

  // MOB
  mobs.forEach(m=>{
    m.x+=m.dx; m.y+=m.dy;
    ctx.beginPath();
    ctx.arc(m.x+offsetX, m.y+offsetY, 12,0,Math.PI*2);
    ctx.fillStyle="green";
    ctx.fill();
  });

  // HEROBRINE
  herobrine.timer++;
  if(herobrine.timer>300){
    herobrine.visible = Math.random()<0.3;
    herobrine.x = player.x + (Math.random()*400-200);
    herobrine.y = player.y + (Math.random()*400-200);
    herobrine.timer=0;
  }

  if(herobrine.visible){
    ctx.beginPath();
    ctx.arc(herobrine.x+offsetX, herobrine.y+offsetY,15,0,Math.PI*2);
    ctx.fillStyle="black";
    ctx.fill();
  }

  // SECRET
  if(player.y>2000 && !secretFound){
    secretFound=true;
    inventory.gold+=67;
  }

  if(secretFound){
    ctx.fillStyle="gold";
    ctx.fillRect(0,0,canvas.width,80);
    ctx.fillStyle="black";
    ctx.fillText("Selamat menemukan rahasia ini",20,30);
  }

  // PLAYER
  ctx.beginPath();
  ctx.arc(canvas.width/2, canvas.height/2, player.size,0,Math.PI*2);
  ctx.fillStyle="blue";
  ctx.fill();

  // UI
  ctx.fillStyle="black";
  ctx.fillText("Wood:"+inventory.wood,10,20);
  ctx.fillText("Stone:"+inventory.stone,10,40);
  ctx.fillText("Gold:"+inventory.gold,10,60);
  ctx.fillText("Pickaxe:"+inventory.pickaxe,10,80);
  ctx.fillText("Sword:"+inventory.sword,10,100);

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
  </html>
