<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BGCraft Mobile</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        canvas { width: 100%; height: 100%; display: none; }
        .overlay { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://i.imgur.com/3936M3k.jpg'); background-size: cover; z-index: 10; }
        h1 { color: #f1c40f; font-size: 60px; text-shadow: 4px 4px #2c3e50; margin-bottom: 40px; letter-spacing: 8px; font-weight: 900; }
        .btn { width: 260px; padding: 18px; margin: 12px; background: #2ecc71; color: white; border: 4px solid #27ae60; text-align: center; font-weight: bold; cursor: pointer; font-size: 22px; box-shadow: 0 4px #1e8449; }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        #settings-menu, #mode-menu { display: none; }
        .label { color: white; margin-top: 15px; font-size: 16px; font-weight: bold; }
        select { width: 220px; padding: 12px; margin-top: 8px; background: #34495e; color: white; border: 2px solid #ecf0f1; border-radius: 5px; }
        #game-ui { position: absolute; bottom: 0; width: 100%; height: 100%; display: none; pointer-events: none; z-index: 5; }
        #joystick-area { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; pointer-events: auto; }
        #joystick-knob { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: rgba(255,255,255,0.6); border-radius: 50%; }
        #action-btn { position: absolute; bottom: 60px; right: 50px; width: 90px; height: 90px; background: rgba(231, 76, 60, 0.7); border: 4px solid #c0392b; border-radius: 50%; pointer-events: auto; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; font-size: 18px; text-shadow: 1px 1px 2px black; }
    </style>
</head>
<body>

    <div id="main-menu" class="overlay">
        <h1>BGCRAFT</h1>
        <div class="btn" onclick="showMenu('mode-menu')">MAIN</div>
        <div class="btn" onclick="showMenu('settings-menu')" style="background: #95a5a6; border-color: #7f8c8d; box-shadow: 0 4px #707b7c;">PENGATURAN</div>
    </div>

    <div id="mode-menu" class="overlay">
        <h2 style="color: white; font-size: 30px; text-shadow: 2px 2px black;">PILIH MODE</h2>
        <div class="btn" onclick="startGame('survival')">SURVIVAL</div>
        <div class="btn" onclick="startGame('creative')" style="background: #3498db; border-color: #2980b9; box-shadow: 0 4px #21618c;">CREATIVE</div>
        <div class="btn" onclick="showMenu('main-menu')" style="background: #e74c3c; border-color: #c0392b; width: 120px; font-size: 14px; margin-top: 30px;">KEMBALI</div>
    </div>

    <div id="settings-menu" class="overlay">
        <h2 style="color: white; font-size: 30px; text-shadow: 2px 2px black;">PENGATURAN</h2>
        <div class="label">KUALITAS GRAFIK</div>
        <select id="gfx"><option>SMOOTH (Low)</option><option selected>FANCY (High)</option></select>
        <div class="label">METODE KONTROL</div>
        <select><option>JOYSTICK (Mobile)</option><option>WASD (PC)</option></select>
        <div class="btn" onclick="showMenu('main-menu')" style="margin-top: 40px; background: #f1c40f; border-color: #d4ac0d; color: black;">SIMPAN</div>
    </div>

    <div id="game-ui">
        <div id="joystick-area"><div id="joystick-knob"></div></div>
        <div id="action-btn">HIT</div>
    </div>

    <canvas id="renderCanvas"></canvas>

    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script>
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);
        let currentMode = "survival";

        function showMenu(menuId) {
            document.querySelectorAll('.overlay').forEach(m => m.style.display = 'none');
            document.getElementById(menuId).style.display = 'flex';
        }

        function startGame(mode) {
            currentMode = mode;
            document.getElementById('mode-menu').style.display = 'none';
            canvas.style.display = 'block';
            document.getElementById('game-ui').style.display = 'block';
            initGame();
        }

        function initGame() {
            const scene = new BABYLON.Scene(engine);
            scene.clearColor = new BABYLON.Color3(0.5, 0.8, 1.0);
            
            const camera = new BABYLON.UniversalCamera("camera", new BABYLON.Vector3(0, 3, -15), scene);
            camera.setTarget(BABYLON.Vector3.Zero());
            camera.attachControl(canvas, true);
            camera.angularSensibility = 1500;

            const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);
            light.intensity = 0.8;

            const ground = BABYLON.MeshBuilder.CreateGround("ground", {width: 200, height: 200}, scene);
            const gMat = new BABYLON.StandardMaterial("gMat", scene);
            gMat.diffuseColor = new BABYLON.Color3(0.2, 0.7, 0.2);
            ground.material = gMat;
            ground.checkCollisions = true;

            const createMob = (name, color, pos, size, isHero = false) => {
                const parent = new BABYLON.TransformNode(name, scene);
                parent.position = pos;
                
                const body = BABYLON.MeshBuilder.CreateCylinder(name+"Body", {height: size.h, diameter: size.d}, scene);
                body.position.y = size.h/2;
                const bMat = new BABYLON.StandardMaterial("bMat", scene);
                bMat.diffuseColor = color;
                body.material = bMat;
                body.parent = parent;

                const head = BABYLON.MeshBuilder.CreateSphere(name+"Head", {diameter: size.d * 0.9}, scene);
                head.position.y = size.h + (size.d * 0.4);
                head.material = bMat;
                head.parent = parent;

                if (isHero) {
                    const eyeMat = new BABYLON.StandardMaterial("eyeMat", scene);
                    eyeMat.emissiveColor = BABYLON.Color3.White();
                    const el = BABYLON.MeshBuilder.CreateSphere("el", {diameter: 0.15}, scene);
                    el.parent = head; el.position = new BABYLON.Vector3(-0.2, 0.1, -0.4); el.material = eyeMat;
                    const er = el.clone("er"); er.position.x = 0.2;
                }
                parent.metadata = { type: "mob", hp: 5 };
                return parent;
            };

            createMob("Sapi", new BABYLON.Color3(0.5, 0.3, 0.2), new BABYLON.Vector3(6, 0, 5), {h: 1.5, d: 1.4});
            createMob("Kucing", new BABYLON.Color3(1, 0.6, 0), new BABYLON.Vector3(-5, 0, 8), {h: 0.7, d: 0.6});
            createMob("Domba", new BABYLON.Color3(0.9, 0.9, 0.9), new BABYLON.Vector3(10, 0, -5), {h: 1.2, d: 1.1});
            createMob("Herobrine", new BABYLON.Color3(0.1, 0.3, 0.8), new BABYLON.Vector3(0, 0, 20), {h: 1.8, d: 0.9}, true);

            const knob = document.getElementById('joystick-knob');
            const joy = document.getElementById('joystick-area');
            let moveVec = new BABYLON.Vector3(0,0,0);

            joy.addEventListener('touchmove', (e) => {
                const t = e.touches[0];
                const r = joy.getBoundingClientRect();
                const dx = t.clientX - (r.left + 60);
                const dy = t.clientY - (r.top + 60);
                const dist = Math.sqrt(dx*dx + dy*dy);
                const max = 40;
                let fx = dx, fy = dy;
                if (dist > max) { fx *= max/dist; fy *= max/dist; }
                knob.style.transform = `translate(${fx}px, ${fy}px)`;
                const fwd = camera.getDirection(BABYLON.Vector3.Forward());
                const rgt = camera.getDirection(BABYLON.Vector3.Right());
                moveVec = fwd.scale(-fy * 0.006).add(rgt.scale(fx * 0.006));
                moveVec.y = 0;
            });

            joy.addEventListener('touchend', () => {
                knob.style.transform = 'translate(0,0)';
                moveVec = BABYLON.Vector3.Zero();
            });

            document.getElementById("action-btn").addEventListener("touchstart", () => {
                const ray = camera.getForwardRay(5);
                const hit = scene.pickWithRay(ray);
                if (hit.pickedMesh && hit.pickedMesh.parent && hit.pickedMesh.parent.metadata && hit.pickedMesh.parent.metadata.type === "mob") {
                    const m = hit.pickedMesh.parent;
                    m.metadata.hp--;
                    m.scaling = new BABYLON.Vector3(1.1, 0.9, 1.1);
                    setTimeout(() => m.scaling = new BABYLON.Vector3(1,1,1), 100);
                    if (m.metadata.hp <= 0) m.setEnabled(false);
                }
            });

            if (currentMode === "survival") {
                scene.gravity = new BABYLON.Vector3(0, -0.9, 0);
                camera.applyGravity = true;
                camera.checkCollisions = true;
                camera.ellipsoid = new BABYLON.Vector3(1, 1.5, 1);
            } else {
                camera.speed = 2.0;
            }

            scene.onBeforeRenderObservable.add(() => camera.position.addInPlace(moveVec));
            engine.runRenderLoop(() => scene.render());
        }
        window.addEventListener("resize", () => engine.resize());
    </script>
</body>
</html>
