<!DOCTYPE html>
<html>
<head>
    <title>Website Simple</title>
</head>
<body>

    <h1>Website Gabut</h1>

    <button onclick="tampilText()">Pencet Gue</button>

    <p id="hasil"></p>

    <script>
        function tampilText() {
            document.getElementById("hasil").innerHTML = "Halo, ini text muncul 😎";
        }
    </script>

</body>
</html>
